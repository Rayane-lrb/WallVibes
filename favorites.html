<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Favorites</title>
    <link rel="stylesheet" href="src/style.css" />

  <body>
        <div id="app">
      <div class="nav-div">
        <nav class="navbar">
          <div class="nav-left">
            <h1 class="logo">WallVibes</h1>
            <ul class="nav-left-links">
              <a href="index.html">Menu</a>
              <a href="favorites.html">Favorieten</a>

          <section class="search-filter-bar">

              <option value="nieuwst">Nieuwste eerst</option>
              <option value="oudste">Oudste eerst</option>
            </select>
          </div>
          <div class="search-bar-container">
            <input
              type="text"
              id="searchInput"
              placeholder="Zoek een locatie in Brussel..."
            />
          </div>
        </section>
        <section class="results-container">

        </section>
        </main>
      </div>     
      <script type="module" src="src/favorites.js"></script>
