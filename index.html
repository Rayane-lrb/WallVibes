<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="...." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Raleway&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/style.css" />
  <title>WallVibes</title>
</head>

<body>
  <div id="app">
    <div class="nav-div">
      <nav class="navbar">
        <div class="nav-left">
          <h1 class="logo">WallVibes</h1>
          <ul class="nav-left-links">
            <a href="index.html">Menu</a>
            <a href="favorites.html">Favorieten</a>
          </ul>
        </div>
        <div class="nav-right">
          <button id="themeBtn">
            <img id="themeBtn-img" src="public/moon.svg" alt="" />
          </button>
        </div>
      </nav>
    </div>
    <main id="main-content">
      <section class="search-filter-bar">
        <div class="filter-wrapper">
          <select id="sortSelect">
            <option value="" disabled selected hidden>Sorteren</option>
            <option value="az">A -> Z</option>
            <option value="za">Z -> A</option>
            <option value="nieuwst">Nieuwste eerst</option>
            <option value="oudste">Oudste eerst</option>
            <option value="per gemeente">Op gemeente</option>
          </select>
        </div>
        <div class="search-bar-container">
          <input type="text" id="searchInput" placeholder=" Zoek een locatie in Brussel..." />
        </div>
      </section>
      <p id="geenResultaatbericht" style="display: none;"> Geen resultaat gevonden</p>
      <section id="results-container"></section>
    </main>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
